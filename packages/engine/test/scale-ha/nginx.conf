events {}

http {
  # Docker's embedded DNS. Re-resolving "engine" per request makes nginx
  # round-robin across the replica IPs instead of pinning the first one.
  resolver 127.0.0.11 valid=1s ipv6=off;

  server {
    listen 80;

    location / {
      set $backend "engine:4000";
      proxy_pass http://$backend;
      proxy_set_header Host $host;
      # Surface which replica served the request so fan-out is observable.
      add_header X-Upstream $upstream_addr always;
    }
  }
}
