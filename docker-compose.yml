services:
  postgres:
    image: pgvector/pgvector:pg16
    container_name: polyant-postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-polyant}
      POSTGRES_USER: ${POSTGRES_USER:-polyant}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:?POSTGRES_PASSWORD is required}
    ports:
      - "${POSTGRES_PORT:-5432}:5432"
    volumes:
      - polyant-pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-polyant} -d ${POSTGRES_DB:-polyant}"]
      interval: 5s
      timeout: 5s
      retries: 5

volumes:
  polyant-pgdata:
