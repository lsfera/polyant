version: 2
updates:
  - package-ecosystem: npm
    directory: "/"
    schedule:
      interval: weekly
      day: monday
      time: "06:00"
      timezone: "UTC"
    open-pull-requests-limit: 10
    labels:
      - dependencies
    commit-message:
      prefix: chore
      include: scope
    groups:
      ai-sdk:
        patterns:
          - "@ai-sdk/*"
          - "ai"
      nestjs:
        patterns:
          - "@nestjs/*"
      next-react:
        patterns:
          - "next"
          - "next-*"
          - "react"
          - "react-*"
          - "@types/react*"
      radix-ui:
        patterns:
          - "@radix-ui/*"
          - "radix-ui"
      testing:
        patterns:
          - "vitest"
          - "@vitest/*"
          - "@testing-library/*"

  - package-ecosystem: github-actions
    directory: "/"
    schedule:
      interval: monthly
    labels:
      - dependencies
      - ci
    commit-message:
      prefix: ci
      include: scope
  # docker entries removed: no Dockerfile exists in packages/engine or packages/web.
  # Re-add when Dockerfiles are introduced.
